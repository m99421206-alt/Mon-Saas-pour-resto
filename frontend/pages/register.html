<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="description" content="Créez votre compte MenuGo — menu digital pour restaurant." />
    <title>Inscription — MenuGo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body class="auth-page">
    <main class="auth-main">
      <div class="auth-card">
        <a class="auth-brand" href="../../index.html" aria-label="MenuGo — Accueil">
          <span class="auth-brand__logo">
            <img src="../../assets/images/icone/logo.webp" alt="MenuGo" width="40" height="40" />
          </span>
          <span class="auth-brand__name">MenuGo</span>
        </a>

        <h1 class="auth-title">Créez votre menu digital</h1>
        <p class="auth-switch">
          Vous avez déjà un compte ? <a href="login.html">Connectez-vous</a>
        </p>

        <form class="auth-form" id="form-register" action="#" method="post" novalidate>
          <div class="auth-field">
            <label for="restaurant-name">Nom du restaurant</label>
            <input
              id="restaurant-name"
              name="restaurantName"
              type="text"
              autocomplete="organization"
              placeholder="Ex : Le king"
              required
            />
          </div>

          <div class="auth-field">
            <label for="full-name">Nom </label>
            <input
              id="full-name"
              name="fullName"
              type="text"
              autocomplete="name"
              placeholder="Ex : Moussa Coulibaly"
              required
              maxlength="160"
            />
          </div>

          <div class="auth-field">
            <label for="whatsapp">Téléphone principal (WhatsApp pour les commandes)</label>
            <input
              id="whatsapp"
              name="whatsapp"
              type="tel"
              autocomplete="tel"
              placeholder="+223 00 00 00 00"
              required
            />
            <span class="auth-field-hint">Ce numéro est enregistré comme contact principal du compte et pour recevoir les commandes.</span>
          </div>

          <div class="auth-field">
            <label for="registration-quartier">Quartier</label>
            <input
              id="registration-quartier"
              name="quartier"
              type="text"
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
              data-lpignore="true"
              placeholder="Ex. : Hamdallaye, Hippodrome, Badalabougou…"
              required
              maxlength="120"
            />
           
          </div>

          <div class="auth-field">
            <label for="email">Adresse email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="Restaurant@gmail.com"
              required
            />
          </div>

          <div class="auth-field">
            <label for="password">Mot de passe</label>
            <div class="auth-password-wrap">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="new-password"
                minlength="8"
                required
              />
              <button
                type="button"
                class="auth-password-toggle"
                data-password-target="password"
                aria-label="Afficher le mot de passe"
                aria-pressed="false"
              >
                <span class="auth-password-toggle__icons" aria-hidden="true">
                  <svg class="auth-password-toggle__eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                    <circle cx="13" cy="12" r="3" />
                  </svg>
                  <svg class="auth-password-toggle__eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A11.93 11.93 0 0112 20c-7 0-11-8-11-8a21.71 21.71 0 015.06-7.94M9.9 4.24A11.93 11.93 0 0112 4c7 0 11 8 11 8a21.71 21.71 0 01-5.06 7.94" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </span>
              </button>
            </div>
          </div>

          <div class="auth-field">
            <label for="password-confirm">Confirmer le mot de passe</label>
            <div class="auth-password-wrap">
              <input
                id="password-confirm"
                name="passwordConfirm"
                type="password"
                autocomplete="new-password"
                required
              />
              <button
                type="button"
                class="auth-password-toggle"
                data-password-target="password-confirm"
                aria-label="Afficher le mot de passe"
                aria-pressed="false"
              >
                <span class="auth-password-toggle__icons" aria-hidden="true">
                  <svg class="auth-password-toggle__eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                    <circle cx="13" cy="12" r="3" />
                  </svg>
                  <svg class="auth-password-toggle__eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A11.93 11.93 0 0112 20c-7 0-11-8-11-8a21.71 21.71 0 015.06-7.94M9.9 4.24A11.93 11.93 0 0112 4c7 0 11 8 11 8a21.71 21.71 0 01-5.06 7.94" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </span>
              </button>
            </div>
          </div>

          <p class="auth-error" id="register-error" role="alert"></p>

          <button type="submit" class="auth-submit">Créer mon compte</button>
        </form>
      </div>
    </main>

    <script src="../js/config.js" defer></script>
    <script src="../js/email-validate.js" defer></script>
    <script src="../js/password-toggle.js" defer></script>
    <script src="../js/register.js" defer></script>
  </body>
</html>
