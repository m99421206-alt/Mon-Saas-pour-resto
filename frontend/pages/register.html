<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="description" content="Créez votre compte AfricaMenu — menu digital pour restaurant." />
    <title>Inscription — AfricaMenu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body class="auth-page">
    <main class="auth-main">
      <div class="auth-card">
        <a class="auth-brand" href="../../index.html" aria-label="AfricaMenu — Accueil">
          <span class="auth-brand__logo">
            <img src="../../docs/img/logo.png" alt="" width="40" height="40" />
          </span>
          <span class="auth-brand__name">AfricaMenu</span>
        </a>

        <h1 class="auth-title">Créez votre menu digital</h1>
        <p class="auth-switch">
          Vous avez déjà un compte ? <a href="login.html">Connectez-vous</a>
        </p>

        <form class="auth-form" id="form-register" action="#" method="post" novalidate>
          <div class="auth-field">
            <label for="restaurant-name">Nom du restaurant</label>
            <input
              id="restaurant-name"
              name="restaurantName"
              type="text"
              autocomplete="organization"
              placeholder="Ex : Le king"
              required
            />
          </div>

          <div class="auth-field">
            <label for="email">Adresse email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="Restaurant@gmail.com"
              required
            />
          </div>

          <div class="auth-field">
            <label for="whatsapp">Numéro WhatsApp (pour les commandes)</label>
            <input
              id="whatsapp"
              name="whatsapp"
              type="tel"
              autocomplete="tel"
              placeholder="+223 00 00 00 00"
              required
            />
          </div>

          <div class="auth-field">
            <label for="password">Mot de passe</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              minlength="8"
              required
            />
          </div>

          <div class="auth-field">
            <label for="password-confirm">Confirmer le mot de passe</label>
            <input
              id="password-confirm"
              name="passwordConfirm"
              type="password"
              autocomplete="new-password"
              required
            />
          </div>

          <p class="auth-error" id="register-error" role="alert"></p>

          <button type="submit" class="auth-submit">Créer mon compte</button>
        </form>
      </div>
    </main>

    <script src="../js/register.js"></script>
  </body>
</html>
