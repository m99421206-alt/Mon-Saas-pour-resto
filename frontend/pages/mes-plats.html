<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Gérez les plats de votre menu — AfricaMenu." />
    <title>Mes plats — AfricaMenu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body class="dashboard-page plats-page">
    <!-- Même chrome que le tableau de bord : entête + drawer -->
    <main class="dashboard-main" id="mes-plats-main">
      <header class="dash-topbar">
        <a href="../../index.html" class="dash-brand" aria-label="Retour accueil AfricaMenu">
          <span class="dash-brand__logo" aria-hidden="true">
            <img src="../../assets/images/icone/logo.png" alt="" width="40" height="40" />
          </span>
          <span class="dash-brand__name">AfricaMenu</span>
        </a>

        <button
          class="dash-menu-btn"
          id="open-drawer"
          type="button"
          aria-label="Ouvrir le menu"
          aria-controls="dash-drawer"
          aria-expanded="false"
        >
          <span class="dash-menu-bars" aria-hidden="true"></span>
        </button>
      </header>

      <!-- Titre de page -->
      <header class="plats-page-head">
        <h1 class="plats-page-title">Mes Plats</h1>
        <p class="plats-page-sub">Gérez les plats de votre menu</p>
      </header>

      <!-- CTA principal (pleine largeur) -->
      <button type="button" class="plats-add-btn" id="plats-add-main" data-action="add-plat">
        <span class="plats-add-btn__plus" aria-hidden="true">+</span>
        <span>Ajouter un plat</span>
      </button>

      <!-- État vide : liste des plats vide (brancher données API plus tard) -->
      <section class="plats-empty" aria-labelledby="plats-empty-title">
        <div class="plats-empty__icon-wrap" aria-hidden="true">
          
            <img src ="../../assets/images/icone/logo.png" 
            alt ="" width="50" height="50"/>
         
        </div>
        <h2 id="plats-empty-title" class="plats-empty__title">Aucun plat</h2>
        <p class="plats-empty__desc">Commencez par ajouter des plats à votre menu</p>
        <button type="button" class="plats-empty__cta" id="plats-add-empty" data-action="add-plat">
          + Ajouter un plat
        </button>
      </section>
    </main>

    <div class="dash-overlay" id="dash-overlay" hidden aria-hidden="true"></div>

    <button type="button" class="dash-drawer-close" id="close-drawer" hidden aria-label="Fermer le menu">
      <span class="dash-drawer-close__x" aria-hidden="true">×</span>
    </button>

    <aside class="dash-drawer" id="dash-drawer" aria-labelledby="dash-drawer-title" aria-hidden="true">
      <header class="dash-drawer__header">
        <div class="dash-drawer__brand" id="dash-drawer-title">
          <span class="dash-drawer__logo" aria-hidden="true">
            <img src="../../assets/images/icone/logo.png" alt="" width="30" height="30" />
          </span>
          <span class="dash-drawer__brand-name">AfricaMenu</span>
        </div>
      </header>

      <nav class="dash-drawer__nav" aria-label="Navigation principale">
        <ul class="dash-drawer__list">
          <li>
            <a class="dash-drawer__link" href="dashboard.html">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/tableaux-de-bord.png" alt="" width="20" height="20" />
              </span>
              <span class="dash-drawer__label">tableau de bord</span>
            </a>
          </li>
          <li>
            <a class="dash-drawer__link is-active" href="mes-plats.html" aria-current="page">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/restaurant .png" alt="" width="30" height="30" />
              </span>
              <span class="dash-drawer__label">Mes plats</span>
            </a>
          </li>
          <li>
            <a class="dash-drawer__link" href="#">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/categorie (1).png" alt="" width="20" height="20" />
              </span>
              <span class="dash-drawer__label">Catégories</span>
            </a>
          </li>
          <li>
            <a class="dash-drawer__link" href="#">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/menu.png" alt="" width="20" height="20" />
              </span>
              <span class="dash-drawer__label">Mon Menu</span>
            </a>
          </li>
          <li>
            <a class="dash-drawer__link" href="#">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/qr-code.png" alt="" width="30" height="30" />
              </span>
              <span class="dash-drawer__label">QR Code</span>
            </a>
          </li>
          <li>
            <a class="dash-drawer__link" href="#">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/parametres.png" alt="" width="20" height="20" />
              </span>
              <span class="dash-drawer__label">Paramètres</span>
            </a>
          </li>
        </ul>
      </nav>

      <footer class="dash-drawer__footer">
        <p class="dash-drawer__resto">Nom du resto</p>
        <p class="dash-drawer__email">email du resto</p>
        <a class="dash-drawer__logout" href="login.html">
          <span class="dash-drawer__ico dash-drawer__ico--logout" aria-hidden="true">
            <img src="../../assets/images/icone/se-deconnecter.png" alt="" width="20" height="20" />
          </span>
          <span>Déconnexion</span>
        </a>
      </footer>
    </aside>

    <script src="../js/dashboard.js"></script>
    <script src="../js/mes-plats.js"></script>
  </body>
</html>
