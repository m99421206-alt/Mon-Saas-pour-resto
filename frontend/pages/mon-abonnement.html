<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Mon abonnement — AfricaMenu (espace restaurant)." />
    <title>Mon abonnement — AfricaMenu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body class="dashboard-page">
    <main class="dashboard-main" id="mon-abonnement-main">
      <header class="dash-topbar">
        <a href="../../index.html" class="dash-brand" aria-label="Retour accueil AfricaMenu">
          <span class="dash-brand__logo" aria-hidden="true">
            <img src="../../assets/images/icone/logo.webp" alt="Logo AfricaMenu" width="40" height="40" />
          </span>
          <span class="dash-brand__name">AfricaMenu</span>
        </a>

        <button
          class="dash-menu-btn"
          id="open-drawer"
          type="button"
          aria-label="Ouvrir le menu"
          aria-controls="dash-drawer"
          aria-expanded="false"
        >
          <span class="dash-menu-bars" aria-hidden="true"></span>
        </button>
      </header>

      <section class="dash-hero dash-page-hero">
        <div class="dash-hero__text">
          <h1 class="plats-page-title" id="mon-abonnement-page-title">Mon abonnement</h1>
          <p class="plats-page-sub" id="mon-abonnement-page-sub" hidden>
            Chargement de votre formule et des options de renouvellement…
          </p>
        </div>
      </section>

      <div id="subscription-root" class="mon-abonnement-root" aria-live="polite"></div>
    </main>

    <div class="dash-overlay" id="dash-overlay" hidden aria-hidden="true"></div>

    <button type="button" class="dash-drawer-close" id="close-drawer" hidden aria-label="Fermer le menu">
      <span class="dash-drawer-close__x" aria-hidden="true">×</span>
    </button>

    <aside class="dash-drawer" id="dash-drawer" aria-labelledby="dash-drawer-title" aria-hidden="true">
      <header class="dash-drawer__header">
        <div class="dash-drawer__brand" id="dash-drawer-title">
          <span class="dash-drawer__logo" aria-hidden="true">
            <img src="../../assets/images/icone/logo.webp" alt="" width="30" height="30" />
          </span>
          <span class="dash-drawer__brand-name">AfricaMenu</span>
        </div>
      </header>

      <nav class="dash-drawer__nav" aria-label="Navigation principale">
        <ul class="dash-drawer__list">
          <li>
            <a class="dash-drawer__link" href="dashboard.html">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/tableaux-de-bord.webp" alt="" width="20" height="20" />
              </span>
              <span class="dash-drawer__label">tableau de bord</span>
            </a>
          </li>
          <li>
            <a class="dash-drawer__link" href="mes-plats.html">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/restaurant .webp" alt="" width="30" height="30" />
              </span>
              <span class="dash-drawer__label">Mes plats</span>
            </a>
          </li>
          <li>
            <a class="dash-drawer__link" href="categories.html">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/categorie (1).webp" alt="" width="20" height="20" />
              </span>
              <span class="dash-drawer__label">Catégories</span>
            </a>
          </li>
          <li>
            <a class="dash-drawer__link" href="mon-menu.html">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/carte-de-menu.webp" alt="" width="90" height="90" />
              </span>
              <span class="dash-drawer__label">Mon Menu</span>
            </a>
          </li>
          <li>
            <a class="dash-drawer__link" href="qr-code.html">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/balayage-du-code-qr.webp" alt="" width="30" height="30" />
              </span>
              <span class="dash-drawer__label">QR Code</span>
            </a>
          </li>
          <li>
            <a class="dash-drawer__link is-active" href="mon-abonnement.html" aria-current="page">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/abonnement.webp" alt="" width="22" height="22" />
              </span>
              <span class="dash-drawer__label">Mon abonnement</span>
            </a>
          </li>
          <li>
            <a class="dash-drawer__link" href="parametres.html">
              <span class="dash-drawer__ico" aria-hidden="true">
                <img src="../../assets/images/icone/parametres.webp" alt="" width="20" height="20" />
              </span>
              <span class="dash-drawer__label">Paramètres</span>
            </a>
          </li>
        </ul>
      </nav>

      <footer class="dash-drawer__footer">
        <p class="dash-drawer__resto" id="dashboard-drawer-restaurant">Nom du resto</p>
        <p class="dash-drawer__email" id="dashboard-drawer-email">email du resto</p>
        <a class="dash-drawer__logout" href="login.html" id="dashboard-logout">
          <span class="dash-drawer__ico dash-drawer__ico--logout" aria-hidden="true">
            <img src="../../assets/images/icone/se-deconnecter.webp" alt="" width="20" height="20" />
          </span>
          <span>Déconnexion</span>
        </a>
      </footer>
    </aside>

    <script src="../js/config.js" defer></script>
    <script src="../js/vendor/dompurify.min.js" defer></script>
    <script src="../js/dom-safe.js" defer></script>
    <script src="../js/subscription-alerts.js" defer></script>
    <script src="../js/dashboard-toast.js" defer></script>
    <script src="../js/dash-shell.js" defer></script>
    <script src="../js/dashboard.js" defer></script>
    <script src="../js/restaurant-my-subscription.js" defer></script>
    <script src="../js/mon-abonnement.js" defer></script>
  </body>
</html>
