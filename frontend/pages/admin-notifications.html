<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Notifications administrateur AfricaMenu." />
    <title>Notifications — Admin AfricaMenu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="stylesheet" href="../css/admin-dashboard.css" />
    <link rel="stylesheet" href="../css/admin-notifications.css" />
  </head>
  <body class="adm-app">
    <a class="adm-skip-link" href="#admin-main">Aller au contenu principal</a>

    <aside class="adm-sidebar" id="adm-sidebar-panel" aria-label="Navigation administration plateforme">
      <div class="adm-sidebar__inner">
        <header class="adm-sidebar__head">
          <a href="../../index.html" class="adm-sidebar__brand">
            <span class="adm-sidebar__logo" aria-hidden="true">
              <img src="../../assets/images/icone/logo.webp" alt="AfricaMenu" width="36" height="36" />
            </span>
            <span class="adm-sidebar__brand-text">AfricaMenu <span class="adm-sidebar__badge">Admin</span></span>
          </a>
        </header>

        <nav class="adm-sidebar__nav" aria-label="Sections admin">
          <ul class="adm-sidebar__list">
            <li><a href="admin-dashboard.html" class="adm-sidebar__link">Tableau de bord</a></li>
            <li><a href="admin-users.html" class="adm-sidebar__link">Utilisateurs</a></li>
            <li><a href="admin-restaurants.html" class="adm-sidebar__link">Restaurants</a></li>
            <li><a href="admin-subscriptions.html" class="adm-sidebar__link">Abonnements</a></li>
            <li><a href="admin-settings.html" class="adm-sidebar__link">Paramètres</a></li>
            <li>
              <a href="admin-activity-log.html" class="adm-sidebar__link">
                <span class="adm-sidebar__link-icon" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                    <path d="M12 7v5l4 2" />
                  </svg>
                </span>
                Journal d'activité
              </a>
            </li>
            <li>
              <a href="admin-notifications.html" class="adm-sidebar__link is-active" aria-current="page">
                <span class="adm-sidebar__link-icon" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                  </svg>
                </span>
                Notifications
              </a>
            </li>
          </ul>
        </nav>

        <footer class="adm-sidebar__foot">
          <a href="login.html" class="adm-sidebar__link adm-sidebar__link--muted">Quitter l'admin</a>
        </footer>
      </div>
    </aside>

    <div class="adm-overlay" id="adm-overlay" aria-hidden="true"></div>

    <div class="adm-layout">
      <header class="adm-header">
        <div class="adm-header__inner">
          <button
            type="button"
            class="adm-header__menu-btn"
            id="adm-open-sidebar"
            aria-label="Ouvrir le menu"
            aria-controls="adm-sidebar-panel"
            aria-expanded="false"
          >
            <span class="adm-header__menu-icon" aria-hidden="true"></span>
          </button>
          <div class="adm-header__spacer" aria-hidden="true"></div>
          <div class="adm-header__actions">
            <button type="button" class="adm-header__icon-btn adm-notif-btn" id="adm-notifications" aria-label="Notifications">
              <svg class="adm-notif-btn__icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
              <span class="adm-notif-badge" id="adm-notif-badge" hidden>0</span>
            </button>
            <div class="adm-profile">
              <button type="button" class="adm-profile__trigger">
                <span class="adm-profile__avatar" aria-hidden="true"></span>
                <span class="adm-profile__meta">
                  <span class="adm-profile__name">Admin</span>
                  <span class="adm-profile__role">Plateforme</span>
                </span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <main id="admin-main" class="adm-main">
        <div class="adm-main__inner adm-page--notifications">
          <header class="notif-head">
            <div>
              <h1 class="adm-page-title">Notifications</h1>
              <p class="adm-page-subtitle">
                Inscriptions, demandes de support, réinitialisations de mot de passe et alertes d'abonnement.
              </p>
            </div>
          </header>

          <div id="notif-feedback" class="notif-feedback" role="status" aria-live="polite" hidden></div>

          <div class="notif-filters" id="notif-filters" role="tablist" aria-label="Filtrer les notifications">
            <button type="button" class="notif-filter is-active" data-filter="all">Toutes</button>
            <button type="button" class="notif-filter" data-filter="unread">Non lues</button>
            <button type="button" class="notif-filter" data-filter="password_reset">Réinitialisation mot de passe</button>
            <button type="button" class="notif-filter" data-filter="support">Support</button>
            <button type="button" class="notif-filter" data-filter="subscription">Abonnements</button>
            <button type="button" class="notif-filter" data-filter="registration">Nouveaux restaurants</button>
          </div>

          <ul id="notif-list" class="notif-list" aria-live="polite"></ul>
          <nav id="notif-pagination" class="notif-pagination" aria-label="Pagination" hidden></nav>
        </div>
      </main>
    </div>

    <script src="../js/config.js" defer></script>
    <script src="../js/vendor/dompurify.min.js" defer></script>
    <script src="../js/dom-safe.js" defer></script>
    <script src="../js/admin-guard.js" defer></script>
    <script src="../js/admin-notifications-widget.js" defer></script>
    <script src="../js/admin-notifications.js" defer></script>
  </body>
</html>
