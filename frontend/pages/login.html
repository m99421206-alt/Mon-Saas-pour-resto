<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="description" content="Connectez-vous à AfricaMenu — menu digital pour restaurant." />
    <title>Connexion — AfricaMenu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body class="auth-page auth-page--login">
    <main class="auth-main">
      <div class="auth-card">
        <a class="auth-brand" href="../../index.html" aria-label="AfricaMenu — Accueil">
          <span class="auth-brand__logo">
            <img src="../../assets/images/icone/logo.webp" alt="AfricaMenu" width="40" height="40" />
          </span>
          <span class="auth-brand__name">AfricaMenu</span>
        </a>

        <h1 class="auth-title">Connectez-vous à votre compte</h1>
        <p class="auth-switch auth-switch--solo-link">
          <a href="register.html">Ou créez un compte gratuitement</a>
        </p>

        <form class="auth-form" id="form-login" action="#" method="post" novalidate>
          <div class="auth-field">
            <label for="login-email">Adresse email</label>
            <input
              id="login-email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="Restaurant@gmail.com"
              required
            />
          </div>

          <div class="auth-field">
            <label for="login-password">Mot de passe</label>
            <div class="auth-password-wrap">
              <input
                id="login-password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="auth-password-toggle"
                data-password-target="login-password"
                aria-label="Afficher le mot de passe"
                aria-pressed="false"
              >
                <span class="auth-password-toggle__icons" aria-hidden="true">
                  <svg class="auth-password-toggle__eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                    <circle cx="13" cy="12" r="3" />
                  </svg>
                  <svg class="auth-password-toggle__eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A11.93 11.93 0 0112 20c-7 0-11-8-11-8a21.71 21.71 0 015.06-7.94M9.9 4.24A11.93 11.93 0 0112 4c7 0 11 8 11 8a21.71 21.71 0 01-5.06 7.94" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </span>
              </button>
            </div>
            <p class="auth-forgot-wrap">
              <button type="button" class="auth-forgot-link" id="login-forgot-btn">
                Mot de passe oublié ?
              </button>
            </p>
          </div>

          <p class="auth-error" id="login-error" role="alert"></p>

          <button type="submit" class="auth-submit">Se connecter</button>
        </form>
      </div>
    </main>

    <div
      id="login-forgot-modal"
      class="auth-modal"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
      aria-labelledby="login-forgot-title"
    >
      <div class="auth-modal__backdrop" data-close-forgot tabindex="-1"></div>
      <div class="auth-modal__panel">
        <div class="auth-modal__head">
          <h2 id="login-forgot-title" class="auth-modal__title">Mot de passe oublié</h2>
          <button type="button" class="auth-modal__close" aria-label="Fermer" data-close-forgot>×</button>
        </div>
        <p class="auth-modal__lead">
          Contactez notre support WhatsApp pour recevoir votre code de réinitialisation.
        </p>
        <div class="auth-field">
          <label for="forgot-resto-name">Nom du restaurant <span class="auth-field-optional"></span></label>
          <input
            id="forgot-resto-name"
            type="text"
            autocomplete="organization"
            placeholder="Ex. Chez Moussa"
          />
        </div>
        <div class="auth-field">
          <label for="forgot-phone">Numéro de téléphone <span class="auth-field-optional"></span></label>
          <input
            id="forgot-phone"
            type="tel"
            autocomplete="tel"
            placeholder="Ex. +22370000000"
          />
        </div>
        <a
          id="login-forgot-wa"
          class="auth-wa-btn"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="auth-wa-btn__icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 2.1.55 4.14 1.6 5.94L2 22l4.26-1.12a9.89 9.89 0 005.78 1.8h.01c5.46 0 9.91-4.45 9.91-9.91C21.96 6.45 17.5 2 12.04 2zm5.43 13.93c-.3-.15-1.78-.88-2.05-.98-.27-.1-.47-.15-.67.15-.2.3-.77.98-.95 1.12-.17.13-.35.15-.65.05-.3-.1-1.25-.46-2.38-1.47-.88-.78-1.47-1.75-1.64-2.05-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.38-.02-.52-.07-.15-.67-1.6-.92-2.2-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.08-.79.38-.27.3-1.04 1.02-1.04 2.5 0 1.47 1.08 2.9 1.23 3.1.15.2 2.14 3.27 5.18 4.59.72.31 1.29.5 1.73.64.73.23 1.39.2 1.91.12.58-.09 1.78-.73 2.03-1.44.25-.7.25-1.3.17-1.44-.08-.13-.27-.2-.57-.35z"
              />
            </svg>
          </span>
          Contacter le support WhatsApp
        </a>
        <button type="button" class="auth-modal__ghost" data-close-forgot>Retour à la connexion</button>
      </div>
    </div>

    <script src="../js/config.js" defer></script>
    <script src="../js/email-validate.js" defer></script>
    <script src="../js/password-toggle.js" defer></script>
    <script src="../js/login.js" defer></script>
  </body>
</html>
