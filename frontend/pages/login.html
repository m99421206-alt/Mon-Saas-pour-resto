<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="description" content="Connectez-vous à AfricaMenu — menu digital pour restaurant." />
    <title>Connexion — AfricaMenu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body class="auth-page auth-page--login">
    <main class="auth-main">
      <div class="auth-card">
        <a class="auth-brand" href="../../index.html" aria-label="AfricaMenu — Accueil">
          <span class="auth-brand__logo">
            <img src="../../docs/img/logo.png" alt="" width="40" height="40" />
          </span>
          <span class="auth-brand__name">AfricaMenu</span>
        </a>

        <h1 class="auth-title">Connectez-vous à votre compte</h1>
        <p class="auth-switch auth-switch--solo-link">
          <a href="register.html">Ou créez un compte gratuitement</a>
        </p>

        <form class="auth-form" id="form-login" action="#" method="post" novalidate>
          <div class="auth-field">
            <label for="login-email">Adresse email</label>
            <input
              id="login-email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="Restaurant@gmail.com"
              required
            />
          </div>

          <div class="auth-field">
            <label for="login-password">Mot de passe</label>
            <input
              id="login-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>

          <p class="auth-error" id="login-error" role="alert"></p>

          <button type="submit" class="auth-submit">Se connecter</button>
        </form>
      </div>
    </main>

    <script src="../js/login.js"></script>
  </body>
</html>
