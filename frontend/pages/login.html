<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="description" content="Connectez-vous à MenuGo — menu digital pour restaurant." />
    <title>Connexion — MenuGo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body class="auth-page auth-page--login">
    <main class="auth-main">
      <div class="auth-card">
        <a class="auth-brand" href="../../index.html" aria-label="MenuGo — Accueil">
          <span class="auth-brand__logo">
            <img src="../../docs/img/logo.png" alt="" width="40" height="40" />
          </span>
          <span class="auth-brand__name">MenuGo</span>
        </a>

        <h1 class="auth-title">Connectez-vous à votre compte</h1>
        <p class="auth-switch auth-switch--solo-link">
          <a href="register.html">Ou créez un compte gratuitement</a>
        </p>

        <form class="auth-form" id="form-login" action="#" method="post" novalidate>
          <div class="auth-field">
            <label for="login-email">Adresse email</label>
            <input
              id="login-email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="Restaurant@gmail.com"
              required
            />
          </div>

          <div class="auth-field">
            <label for="login-password">Mot de passe</label>
            <div class="auth-password-wrap">
              <input
                id="login-password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="auth-password-toggle"
                data-password-target="login-password"
                aria-label="Afficher le mot de passe"
                aria-pressed="false"
              >
                <span class="auth-password-toggle__icons" aria-hidden="true">
                  <svg class="auth-password-toggle__eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                    <circle cx="13" cy="12" r="3" />
                  </svg>
                  <svg class="auth-password-toggle__eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A11.93 11.93 0 0112 20c-7 0-11-8-11-8a21.71 21.71 0 015.06-7.94M9.9 4.24A11.93 11.93 0 0112 4c7 0 11 8 11 8a21.71 21.71 0 01-5.06 7.94" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </span>
              </button>
            </div>
          </div>

          <p class="auth-error" id="login-error" role="alert"></p>

          <button type="submit" class="auth-submit">Se connecter</button>
        </form>
      </div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/email-validate.js"></script>
    <script src="../js/password-toggle.js"></script>
    <script src="../js/login.js"></script>
  </body>
</html>
