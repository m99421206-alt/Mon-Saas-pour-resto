<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Menu digital client — AfricaMenu." />
    <title>Menu client — AfricaMenu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/menu-client.css" />
  </head>
  <body class="menu-page">
    <header class="menu-topbar">
      <button class="menu-topbar__button" type="button" aria-label="Ouvrir les catégories">
        <span class="menu-topbar__bars" aria-hidden="true"></span>
      </button>
      <p class="menu-topbar__title" id="restaurant-short-name">LE KING</p>
      <span class="menu-topbar__spacer" aria-hidden="true"></span>
    </header>

    <main class="menu-main">
      <section class="restaurant-hero" aria-labelledby="restaurant-name">
        <div class="restaurant-hero__cover" aria-label="Image de couverture du restaurant"></div>

        <article class="restaurant-card">
          <div class="restaurant-card__logo" aria-label="Logo du restaurant">
            <span>KING</span>
          </div>
          <div class="restaurant-card__content">
            <h1 class="restaurant-card__name" id="restaurant-name">LE KING</h1>
            <p class="restaurant-card__desc" id="restaurant-description">
              Le King, l'endroit idéal pour savourer des plats délicieux dans une ambiance chaleureuse.
            </p>
          </div>
        </article>
      </section>

      <section class="menu-section" aria-labelledby="categories-title">
        <h2 class="menu-section__title" id="categories-title">Categories</h2>
        <div class="category-list" id="category-list"></div>
      </section>

      <section class="menu-section menu-section--featured" aria-labelledby="featured-title">
        <div class="menu-section__head">
          <h2 class="menu-section__title" id="featured-title">Les nouveautés</h2>
          <button class="menu-section__link" type="button" id="view-all-products">Tout voir ›</button>
        </div>
        <div class="product-strip" id="product-strip" aria-label="Nouveautés" tabindex="0"></div>
      </section>
    </main>

    <a
      class="whatsapp-float"
      id="whatsapp-order"
      href="https://wa.me/22300000000?text=Bonjour%2C%20je%20souhaite%20commander"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Commander sur WhatsApp"
    >
      <span class="whatsapp-float__icon" aria-hidden="true">☎</span>
    </a>

    <script src="../js/mon-menu.js"></script>
  </body>
</html>
